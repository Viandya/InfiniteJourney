<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Бесконечная лента</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}

#feed{
    display:flex;
    flex-direction:column;
    align-items:center;
}

.card{
    width:95%;
    max-width:500px;
    margin:10px 0;
    background:#222;
    border-radius:12px;
    overflow:hidden;
}

.card img{
    width:100%;
    display:block;
}

.card p{
    padding:10px;
}

#achievement{
    position:fixed;
    top:25px;
    left:50%;
    transform:translateX(-50%);

    background:#708238;
    color:white;

    padding:14px 24px;
    border-radius:18px;

    font-size:16px;
    font-weight:600;

    box-shadow:0 8px 25px rgba(0,0,0,0.25);

    display:none;
    z-index:1000;

    animation:slideDown .4s ease;
}

@keyframes slideDown{
    from{
        opacity:0;
        transform:translate(-50%,-20px);
    }
    to{
        opacity:1;
        transform:translate(-50%,0);
    }
}

#distanceCounter{
    position:fixed;
    top:20px;
    right:20px;

    background:rgba(0,0,0,0.7);
    color:white;

    padding:10px 15px;
    border-radius:15px;

    font-weight:bold;
    z-index:999;
}
</style>
</head>
<body>

<div id="achievement"></div>
<div id="distanceCounter">🚶 0 м</div>
<div id="feed"></div>

<script>
const feed = document.getElementById("feed");
const achievement = document.getElementById("achievement");
const counter = document.getElementById("distanceCounter");
let distance = 0;

const achievements = [
    {meters:100, text:"🌱 Новичок — 100 м"},
    {meters:1000, text:"🌳 Исследователь — 1 км"},
    {meters:5000, text:"⛰️ Путешественник — 5 км"},
    {meters:10000, text:"🦅 Странник — 10 км"},
    {meters:50000, text:"🌍 Покоритель мира — 50 км"}
];

const unlocked = new Set();

function addPost(){
    const card = document.createElement("div");
    card.className = "card";

    const randomId = Math.floor(Math.random()*1000);

    card.innerHTML = `
        <img src="https://picsum.photos/400/600?random=${randomId}">
        <p>Пост №${randomId}</p>
    `;

    feed.appendChild(card);
}

function showAchievement(text){
    achievement.textContent = text;
    achievement.style.display = "block";

    setTimeout(()=>{
        achievement.style.display = "none";
    },3000);
}

// Функция для расчёта расстояния на основе размера экрана
function calculateDistance(){
    const screenHeightPx = window.innerHeight;
    const screenHeightCm = 15; // условная высота экрана в см
    const cmPerPixel = screenHeightCm / screenHeightPx;
    const distanceCm = window.scrollY * cmPerPixel;
    return Math.floor(distanceCm / 100);
}

// Начальная загрузка постов
for(let i=0;i<10;i++){
    addPost();
}

window.addEventListener("scroll", ()=>{

    // Расчёт пройденного расстояния с помощью новой функции
    distance = calculateDistance();

    // Обновление счётчика с отображением метров или километров
    if(distance < 1000){
        counter.textContent = `🚶 ${distance} м`;
    }else{
        counter.textContent = `🚶 ${(distance/1000).toFixed(2)} км`;
    }

    // Проверка достижений
    achievements.forEach(a=>{
        if(distance >= a.meters && !unlocked.has(a.meters)){
            unlocked.add(a.meters);
            showAchievement(a.text);
        }
    });

    // Подгрузка новых карточек
    if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 500){
        for(let i=0;i<5;i++){
            addPost();
        }
    }
});
</script>

</body>
</html>
